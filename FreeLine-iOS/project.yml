name: FreeLine

options:
  deploymentTarget:
    iOS: "18.0"
  bundleIdPrefix: com.freeline
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: 6.0
    PRODUCT_NAME: FreeLine
    TARGETED_DEVICE_FAMILY: "1"
    CODE_SIGNING_ALLOWED: NO
    CODE_SIGNING_REQUIRED: NO

packages:
  GoogleMobileAds:
    url: https://github.com/googleads/swift-package-manager-google-mobile-ads.git
    exactVersion: 13.1.0
  RevenueCat:
    url: https://github.com/RevenueCat/purchases-ios.git
    exactVersion: 5.65.0
  TwilioVoice:
    url: https://github.com/twilio/twilio-voice-ios
    exactVersion: 6.13.6

targets:
  FreeLine:
    type: application
    platform: iOS
    deploymentTarget: "18.0"
    sources:
      - path: Sources
      - path: Config
    settings:
      base:
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: Config/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.freeline.ios
    dependencies:
      - package: GoogleMobileAds
        product: GoogleMobileAds
      - package: RevenueCat
        product: RevenueCat
      - package: TwilioVoice
        product: TwilioVoice

schemes:
  FreeLine:
    build:
      targets:
        FreeLine: all
