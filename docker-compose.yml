services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: freeline
      POSTGRES_USER: freeline
      POSTGRES_PASSWORD: freeline
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U freeline -d freeline"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
